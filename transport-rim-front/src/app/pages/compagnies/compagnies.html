<section class="mx-auto max-w-7xl px-4 py-12 sm:px-6 lg:px-8">
  <h1 class="text-3xl font-bold text-slate-900 dark:text-white">Nos compagnies partenaires</h1>
  <p class="mt-2 text-slate-500 dark:text-slate-400">Des compagnies de confiance pour voyager partout en Mauritanie.</p>

  <div class="mt-8 grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
    @for (company of companies; track company.name) {
      <div class="flex items-center gap-4 rounded-xl border border-slate-200 p-5 dark:border-slate-800">
        <span class="flex h-14 w-14 shrink-0 items-center justify-center rounded-lg bg-white p-1.5 dark:bg-slate-100">
          <img [src]="company.logo" [alt]="company.name" class="h-full w-full object-contain" />
        </span>
        <div>
          <h3 class="font-semibold text-slate-900 dark:text-white">{{ company.name }}</h3>
          <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">{{ company.fleet }} bus · {{ company.destinations }} destinations</p>
        </div>
      </div>
    }
  </div>
</section>
