<div class="flex min-h-screen flex-col bg-slate-50 dark:bg-slate-950">
  <header class="border-b border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-900">
    <div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-4 sm:px-6">
      <a routerLink="/" class="text-lg font-bold text-brand-600">Transport Rim</a>

      <nav class="flex items-center gap-4 text-sm font-medium text-slate-600 dark:text-slate-300">
        @for (link of navLinks; track link.path) {
          <a
            [routerLink]="link.path"
            routerLinkActive="text-brand-600"
            class="hover:text-brand-600"
          >
            {{ link.label }}
          </a>
        }
        <span class="text-slate-300 dark:text-slate-700">|</span>
        <span class="text-slate-500 dark:text-slate-400">{{ auth.currentUser()?.name }}</span>
        <button type="button" (click)="logout()" class="font-semibold text-red-600 hover:text-red-700">
          Déconnexion
        </button>
      </nav>
    </div>
  </header>

  <main class="mx-auto w-full max-w-5xl flex-1 px-4 py-8 sm:px-6">
    <router-outlet />
  </main>
</div>
